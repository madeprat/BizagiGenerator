<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador XPDL/BPMN FINAL - madeomade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(135deg, #0545B0 0%, #5A84CE 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        header { background: linear-gradient(135deg, #0545B0 0%, #5A84CE 100%); color: white; padding: 40px; text-align: center; }
        header h1 { font-size: 28px; margin-bottom: 10px; }
        header p { font-size: 14px; opacity: 0.9; }
        .content { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 200px); }
        .panel { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .left-panel { border-right: 1px solid #e2e8f0; background: #f8fafc; }
        .right-panel { background: white; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { font-weight: 600; color: #334155; font-size: 14px; }
        input, textarea { padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; transition: all 0.2s; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: #0545B0; box-shadow: 0 0 0 3px rgba(5,69,176,0.1); }
        textarea { resize: vertical; min-height: 350px; font-family: monospace; font-size: 13px; line-height: 1.6; }
        .btn-group { display: flex; gap: 10px; margin-top: auto; }
        button { padding: 12px 24px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .btn-primary { background: #0545B0; color: white; flex: 2; }
        .btn-primary:hover { background: #04388d; }
        .btn-secondary { background: #e2e8f0; color: #334155; flex: 1; }
        .btn-secondary:hover { background: #cbd5e1; }
        .tabs { display: flex; border-bottom: 2px solid #e2e8f0; margin-bottom: 15px; }
        .output-tab { padding: 10px 20px; cursor: pointer; font-weight: 600; color: #64748b; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .output-tab.active { color: #0545B0; border-bottom-color: #0545B0; }
        .tab-content { display: none; flex-direction: column; gap: 15px; height: 100%; }
        .tab-content.active { display: flex; }
        .code-container { position: relative; flex: 1; min-height: 400px; display: flex; flex-direction: column; }
        pre { background: #0f172a; color: #e2e8f0; padding: 20px; border-radius: 8px; overflow: auto; font-family: "Fira Code", monospace; font-size: 13px; flex: 1; max-height: 500px; white-space: pre-wrap; }
        .message { padding: 12px; border-radius: 6px; font-size: 14px; font-weight: 500; display: none; }
        .message.show { display: block; }
        .message.success { background: #bbf7d0; color: #166534; }
        .message.error { background: #fecaca; color: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Generador Avanzado XPDL / BPMN</h1>
            <p>madeomade • Generación de diagramas compatibles con Bizagi Modeler</p>
        </header>
        <div class="content">
            <div class="panel left-panel">
                <div class="form-row">
                    <div class="form-group">
                        <label for="processId">ID del Proceso</label>
                        <input type="text" id="processId" value="SGP_VIAJE_P01">
                    </div>
                    <div class="form-group">
                        <label for="processName">Nombre del Proceso</label>
                        <input type="text" id="processName" placeholder="Ej: Viaje Corporativo">
                    </div>
                </div>
                <div class="form-group">
                    <label for="processDescription">Descripción Estructurada de Actividades</label>
                    <textarea id="processDescription" placeholder="1. Tarea&#10;Responsable: Rol&#10;Acción: Descripción..."></textarea>
                </div>
                <div id="message" class="message"></div>
                <div class="btn-group">
                    <button class="btn-secondary" onclick="clearForm()">Limpiar</button>
                    <button class="btn-primary" onclick="generateDiagrams()">Generar Modelos</button>
                </div>
            </div>
            
            <div class="panel right-panel">
                <div class="tabs">
                    <div class="output-tab active" onclick="switchTab('xpdl-tab')">XPDL 2.2 (Bizagi)</div>
                    <div class="output-tab" onclick="switchTab('bpmn-tab')">BPMN 2.0 Standard</div>
                </div>
                
                <div id="xpdl-tab" class="tab-content active">
                    <div class="code-container">
                        <pre><code id="xpdlOutput"></code></pre>
                    </div>
                    <button class="btn-primary" onclick="downloadFile('xpdl')">Descargar .XPDL</button>
                </div>
                
                <div id="bpmn-tab" class="tab-content">
                    <div class="code-container">
                        <pre><code id="bpmnOutput"></code></pre>
                    </div>
                    <button class="btn-primary" onclick="downloadFile('bpmn')">Descargar .BPMN</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let processData = { xpdl: '', bpmn: '' };

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function cleanXmlString(str) {
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&apos;');
        }

        function parseText(text) {
            const lines = text.split('\n');
            const activities = [];
            const roles = new Set();
            let currentActivity = null;
            let isCapturingAction = false;

            for (let rawLine of lines) {
                // 1. Limpieza rigurosa de viñetas de Word (•), tabulaciones y espacios en blanco
                let lineStripped = rawLine.replace(/•/g, '-').replace(/\t/g, ' ').trim();

                if (!lineStripped) {
                    if (currentActivity && isCapturingAction && currentActivity.action) {
                        currentActivity.action += '\n';
                    }
                    continue;
                }

                // 2. Comprobar inicio de nueva actividad (Ej: "1. Solicitud")
                const numMatch = lineStripped.match(/^\s*(\d+)\.\s*(.+?)$/);
                if (numMatch) {
                    if (currentActivity) {
                        currentActivity.action = currentActivity.action.trim();
                        activities.push(currentActivity);
                    }
                    currentActivity = {
                        num: parseInt(numMatch[1]),
                        name: numMatch[2].trim(),
                        responsables: [],
                        action: ''
                    };
                    isCapturingAction = false;
                    continue;
                }

                // 3. Comprobar línea de responsable/s
                const respMatch = lineStripped.match(/^Responsables?:\s*(.+?)$/i);
                if (respMatch && currentActivity) {
                    const respText = respMatch[1];
                    const respList = respText.split(/\s+y\s+|\s*,\s*/);
                    respList.forEach(resp => {
                        const cleanResp = resp.trim();
                        if (cleanResp) {
                            currentActivity.responsables.push(cleanResp);
                            roles.add(cleanResp);
                        }
                    });
                    isCapturingAction = false;
                    continue;
                }

                // 4. Comprobar inicio de la acción
                const actionMatch = lineStripped.match(/^Acción:\s*(.+?)$/i);
                if (actionMatch && currentActivity) {
                    currentActivity.action = actionMatch[1].trim();
                    isCapturingAction = true;
                    continue;
                }

                // 5. Acumulador multilínea (Listas secundarias, sub-párrafos, viñetas convertidas)
                if (currentActivity && isCapturingAction) {
                    if (currentActivity.action) {
                        if (currentActivity.action.endsWith('\n')) {
                            currentActivity.action += lineStripped;
                        } else {
                            currentActivity.action += '\n' + lineStripped;
                        }
                    } else {
                        currentActivity.action = lineStripped;
                    }
                }
            }

            if (currentActivity) {
                currentActivity.action = currentActivity.action.trim();
                activities.push(currentActivity);
            }

            return { activities, roles: Array.from(roles).sort() };
        }

        function generateXPDL(procId, procName, activities, roles) {
            const packageId = generateUUID();
            const processUuid = generateUUID();
            const poolId = generateUUID();
            const timestamp = new Date().toISOString();
            
            // Participantes
            let participantsXml = roles.map(role => {
                return `    <Participant Id="${generateUUID()}" Name="${cleanXmlString(role)}">\n      <ParticipantType Type="ROLE" />\n      <Description>${cleanXmlString(role)}</Description>\n    </Participant>`;
            }).join('\n');

            // Lanes y asignación de coordenadas fijas para Bizagi
            let laneMap = {};
            let yCoord = 0;
            let lanesXml = roles.map(role => {
                const laneId = generateUUID();
                laneMap[role] = { id: laneId, y: yCoord };
                let xml = `        <Lane Id="${laneId}" Name="${cleanXmlString(role)}" ParentPool="${poolId}">\n          <NodeGraphicsInfos>\n            <NodeGraphicsInfo ToolId="BizAgi_Process_Modeler" Height="120" Width="1800" BorderColor="-11513776" FillColor="-1">\n              <Coordinates XCoordinate="50" YCoordinate="${yCoord}" />\n            </NodeGraphicsInfo>\n          </NodeGraphicsInfos>\n        </Lane>`;
                yCoord += 120;
                return xml;
            }).join('\n');

            // Actividades
            let activityMap = {};
            let xCoord = 150;
            let activitiesXml = activities.map((act, index) => {
                const actId = generateUUID();
                const role = act.responsables[0] || roles[0];
                const laneInfo = laneMap[role] || { y: 0 };
                const yPos = laneInfo.y + 25;
                
                activityMap[index] = { id: actId, x: xCoord, y: yPos };
                
                // Formatear saltos de línea de la descripción para que Bizagi los pinte bien en su editor HTML interno
                const htmlAction = cleanXmlString(act.action).replace(/\n/g, '&lt;br/&gt;');
                
                let xml = `        <Activity Id="${actId}" Name="${cleanXmlString(act.name)}">\n          <Description>&lt;p&gt;${htmlAction}&lt;/p&gt;</Description>\n          <Implementation>\n            <Task />\n          </Implementation>\n          <Documentation>&lt;p&gt;${htmlAction}&lt;/p&gt;</Documentation>\n          <NodeGraphicsInfos>\n            <NodeGraphicsInfo ToolId="BizAgi_Process_Modeler" Height="65" Width="110" BorderColor="-16553830" FillColor="-1249281">\n              <Coordinates XCoordinate="${xCoord}" YCoordinate="${yPos}" />\n            </NodeGraphicsInfo>\n          </NodeGraphicsInfos>\n        </Activity>`;
                xCoord += 220;
                return xml;
            }).join('\n');

            // Transiciones en cadena (Flujo secuencial continuo)
            let transitionsXml = [];
            for (let i = 0; i < activities.length - 1; i++) {
                const fromAct = activityMap[i];
                const toAct = activityMap[i + 1];
                transitionsXml.push(`        <Transition Id="${generateUUID()}" From="${fromAct.id}" To="${toAct.id}">\n          <ConnectorGraphicsInfos>\n            <ConnectorGraphicsInfo ToolId="BizAgi_Process_Modeler" BorderColor="-16777216">\n              <Coordinates XCoordinate="${fromAct.x + 110}" YCoordinate="${fromAct.y + 32}" />\n              <Coordinates XCoordinate="${toAct.x}" YCoordinate="${toAct.y + 32}" />\n            </ConnectorGraphicsInfo>\n          </ConnectorGraphicsInfos>\n        </Transition>`);
            }

            return `<?xml version="1.0" encoding="utf-8"?>
<Package xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" Id="${packageId}" Name="${cleanXmlString(procId)}" xmlns="http://www.wfmc.org/2009/XPDL2.2">
  <PackageHeader>
    <XPDLVersion>2.2</XPDLVersion>
    <Vendor>Bizagi Process Modeler</Vendor>
    <Created>${timestamp}</Created>
    <ModificationDate>${timestamp}</ModificationDate>
    <Description>${cleanXmlString(procName)}</Description>
  </PackageHeader>
  <RedefinableHeader>
    <Author>Made - madeomade</Author>
    <Version>1.0</Version>
    <Countrykey>ES</Countrykey>
  </RedefinableHeader>
  <Participants>
${participantsXml}
  </Participants>
  <Pools>
    <Pool Id="${poolId}" Name="${cleanXmlString(procName)}" Process="${processUuid}" BoundaryVisible="true">
      <Lanes>
${lanesXml}
      </Lanes>
      <NodeGraphicsInfos>
        <NodeGraphicsInfo ToolId="BizAgi_Process_Modeler" Height="${roles.length * 120}" Width="1900" BorderColor="-16777216" FillColor="-1">
          <Coordinates XCoordinate="30" YCoordinate="30" />
        </NodeGraphicsInfo>
      </NodeGraphicsInfos>
    </Pool>
  </Pools>
  <WorkflowProcesses>
    <WorkflowProcess Id="${processUuid}" Name="${cleanXmlString(procName)}">
      <Activities>
${activitiesXml}
      </Activities>
      <Transitions>
${transitionsXml.join('\n')}
      </Transitions>
    </WorkflowProcess>
  </WorkflowProcesses>
</Package>`;
        }

        function generateBPMN(processUuid, procName, activities, roles) {
            let activitiesXml = '';
            let activityIds = [];

            activities.forEach(act => {
                const actId = 'Activity_' + generateUUID().replace(/-/g, '_');
                activityIds.push(actId);
                const cleanAction = cleanXmlString(act.action).replace(/\n/g, ' ');
                const primaryPerformer = act.responsables[0] || 'Sin asignar';
                
                activitiesXml += `    <task id="${actId}" name="${cleanXmlString(act.name)}">\n      <documentation>${cleanAction}</documentation>\n      <extensionElements>\n        <bizagi:BizagiExtensions xmlns:bizagi="http://www.bizagi.com/bpmn20">\n          <bizagi:BizagiProperties>\n            <bizagi:BizagiProperty name="performer" value="${cleanXmlString(primaryPerformer)}" />\n          </bizagi:BizagiProperties>\n        </bizagi:BizagiExtensions>\n      </extensionElements>\n    </task>\n`;
            });

            let flowsXml = '';
            for (let i = 0; i < activityIds.length - 1; i++) {
                flowsXml += `    <sequenceFlow id="Flow_${i}" sourceRef="${activityIds[i]}" targetRef="${activityIds[i+1]}" />\n`;
            }

            return `<?xml version="1.0" encoding="UTF-8"?>
<definitions xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" id="Definitions_1" targetNamespace="http://bpmn.org/schema/bpmn" xmlns="http://www.omg.org/spec/BPMN/20100524/MODEL">
  <process id="Process_1" name="${cleanXmlString(procName)}" isExecutable="false">
${activitiesXml}${flowsXml}
  </process>
</definitions>`;
        }

        function generateDiagrams() {
            const id = document.getElementById('processId').value.trim();
            const name = document.getElementById('processName').value.trim();
            const desc = document.getElementById('processDescription').value;

            if (!id || !name || !desc.trim()) {
                showMsg('Por favor, rellena todos los campos del formulario.', 'error');
                return;
            }

            try {
                const { activities, roles } = parseText(desc);

                if (activities.length === 0) {
                    showMsg('No se detectó ninguna actividad válida. Usa el formato "1. Nombre de actividad".', 'error');
                    return;
                }

                processData.xpdl = generateXPDL(id, name, activities, roles);
                processData.bpmn = generateBPMN(id, name, activities, roles);

                document.getElementById('xpdlOutput').textContent = processData.xpdl;
                document.getElementById('bpmnOutput').textContent = processData.bpmn;

                showMsg(`¡Éxito! Se procesaron ${activities.length} actividades en ${roles.length} carriles de responsables.`, 'success');

            } catch (err) {
                showMsg('Error crítico procesando el texto: ' + err.message, 'error');
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.output-tab').forEach(e => e.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        function clearForm() {
            document.getElementById('processId').value = 'SGP_VIAJE_P01';
            document.getElementById('processName').value = '';
            document.getElementById('processDescription').value = '';
            document.getElementById('xpdlOutput').textContent = '';
            document.getElementById('bpmnOutput').textContent = '';
        }

        function downloadFile(type) {
            const content = type === 'xpdl' ? processData.xpdl : processData.bpmn;
            if (!content) {
                showMsg('Primero debes generar el modelo antes de poder descargarlo.', 'error');
                return;
            }
            const blob = new Blob([content], { type: 'application/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${document.getElementById('processId').value}.${type}`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showMsg(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message show ${type}`;
            setTimeout(() => msg.classList.remove('show'), 6000);
        }
    </script>
</body>
</html>
