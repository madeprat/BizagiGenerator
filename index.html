<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador XPDL/BPMN COMPLETO - S2 Grupo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(135deg, #0545B0 0%, #5A84CE 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        header { background: linear-gradient(135deg, #0545B0 0%, #5A84CE 100%); color: white; padding: 40px; text-align: center; }
        header h1 { font-size: 28px; margin-bottom: 10px; }
        header p { font-size: 14px; opacity: 0.9; }
        .content { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 200px); }
        .panel { padding: 30px; border-right: 1px solid #e0e0e0; overflow-y: auto; }
        .panel:last-child { border-right: none; background: #f9f9f9; }
        .panel h2 { font-size: 18px; margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #555; font-size: 13px; text-transform: uppercase; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 6px; font-family: inherit; font-size: 14px; }
        input[type="text"]:focus, textarea:focus { outline: none; border-color: #0545B0; box-shadow: 0 0 0 3px rgba(5, 69, 176, 0.1); }
        textarea { min-height: 350px; resize: vertical; font-family: 'Courier New', monospace; font-size: 13px; }
        .btn-group { display: flex; gap: 10px; margin-top: 30px; }
        button { flex: 1; padding: 14px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #0545B0 0%, #5A84CE 100%); color: white; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(5, 69, 176, 0.3); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary { background: white; border: 2px solid #0545B0; color: #0545B0; }
        .output-tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #e0e0e0; }
        .output-tab { padding: 10px 15px; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-weight: 600; color: #999; }
        .output-tab.active { color: #0545B0; border-bottom-color: #0545B0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .output-area { min-height: 400px; max-height: 500px; overflow-y: auto; background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 10px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
        .message { padding: 15px; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 13px; }
        .message.show { display: block; }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(5, 69, 176, 0.3); border-radius: 50%; border-top-color: #0545B0; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔄 Generador XPDL/BPMN COMPLETO</h1>
            <p>S2 Grupo - Con BPMNDiagram, Shapes, Edges y Waypoints</p>
        </header>
        
        <div class="content">
            <div class="panel">
                <h2>📝 Proceso</h2>
                <div class="message" id="message"></div>
                
                <div class="form-group">
                    <label>ID</label>
                    <input type="text" id="processId" value="SGP_COMPRA_P01">
                </div>
                
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="processName" value="Gestión de Compras">
                </div>
                
                <div class="form-group">
                    <label>País</label>
                    <input type="text" id="countryCode" value="ES" maxlength="2">
                </div>
                
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="processDescription"></textarea>
                </div>
                
                <div class="btn-group">
                    <button class="btn-primary" id="btnGenerate" onclick="generateProcess()">⚙️ Generar</button>
                    <button class="btn-secondary" onclick="clearForm()">🗑️ Limpiar</button>
                </div>
            </div>
            
            <div class="panel">
                <h2>📊 Salida</h2>
                <div class="output-tabs">
                    <button class="output-tab active" onclick="switchTab('xpdl')">XPDL</button>
                    <button class="output-tab" onclick="switchTab('bpmn')">BPMN</button>
                </div>
                <div id="xpdl" class="tab-content active">
                    <div class="output-area" id="xpdlOutput">Presiona Generar...</div>
                    <button class="btn-secondary" onclick="downloadFile('xpdl')" style="width: 100%; margin-top: 10px;">📥 Descargar XPDL</button>
                </div>
                <div id="bpmn" class="tab-content">
                    <div class="output-area" id="bpmnOutput">Presiona Generar...</div>
                    <button class="btn-secondary" onclick="downloadFile('bpmn')" style="width: 100%; margin-top: 10px;">📥 Descargar BPMN</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let processData = {};
        
        document.getElementById('processDescription').value = `1. Identificación de necesidades
Responsable: Encargado de compras
Acción: Evaluar inventario y determinar necesidades de compra.

2. Investigación de proveedores
Responsable: Encargado de compras
Acción: Identificar proveedores potenciales.

3. Solicitud de cotizaciones
Responsable: Encargado de compras
Acción: Solicitar cotizaciones a varios proveedores.

4. Evaluación de cotizaciones
Responsables: Encargado de compras y Gerente de ventas
Acción: Comparar cotizaciones.

5. Emisión de orden de compra
Responsable: Encargado de compras
Acción: Emitir orden de compra formal.

6. Recepción de productos
Responsable: Personal de almacén
Acción: Recibir y verificar productos.

7. Registro de inventario
Responsable: Personal de almacén
Acción: Actualizar sistema de inventario.

8. Proceso de pago
Responsable: Departamento de contabilidad
Acción: Procesar pago al proveedor.`;
        
        function uuid() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => (Math.random() * 16 | 0).toString(16));
        }
        
        function parseProcess(text) {
            const activities = [];
            const roles = new Set();
            const lines = text.split('\n');
            let current = null;
            
            for (const line of lines) {
                const numMatch = line.match(/^\s*(\d+)\.\s*(.+?)$/);
                if (numMatch) {
                    if (current) activities.push(current);
                    current = { num: parseInt(numMatch[1]), name: numMatch[2].trim(), responsables: [], action: '' };
                    continue;
                }
                
                const respMatch = line.match(/^Responsables?:\s*(.+?)$/i);
                if (respMatch && current) {
                    const respList = respMatch[1].split(/\s+y\s+|\s*,\s*/);
                    for (let r of respList) {
                        r = r.trim();
                        if (r) { current.responsables.push(r); roles.add(r); }
                    }
                    continue;
                }
                
                const actionMatch = line.match(/^Acción:\s*(.+?)$/i);
                if (actionMatch && current) current.action = actionMatch[1].trim();
            }
            
            if (current) activities.push(current);
            return { activities, roles: Array.from(roles).sort() };
        }
        
        function calculateLayout(activities, roles) {
            return {
                TASK_WIDTH: 100,
                TASK_HEIGHT: 60,
                EVENT_SIZE: 30,
                SPACING_X: 70,
                LANE_HEIGHT: 120,
                POOL_X: 30,
                POOL_Y: 30,
                LANE_LABEL_WIDTH: 30,
                PADDING_LEFT: 80
            };
        }
        
        // === XPDL (mantenemos lo que funciona) ===
        function generateXPDL(id, name, country, activities, roles) {
            const pkg = uuid();
            const proc = uuid();
            const pool = uuid();
            const now = new Date().toISOString();
            const layout = calculateLayout(activities, roles);
            
            const parts = roles.map(r => `    <Participant Id="${uuid()}" Name="${r}">
      <ParticipantType Type="ROLE" />
      <Description>${r}</Description>
      <ExtendedAttributes>
        <ExtendedAttribute Name="${r.replace(/\s+/g, '')}" />
      </ExtendedAttributes>
    </Participant>`).join('\n');
            
            const lanes = [];
            const laneMap = {};
            let yCoord = 0;
            for (const role of roles) {
                const laneId = uuid();
                laneMap[role] = { id: laneId, y: yCoord, centerY: yCoord + layout.LANE_HEIGHT / 2 };
                lanes.push(`        <Lane Id="${laneId}" Name="${role}" ParentPool="${pool}">
          <NodeGraphicsInfos>
            <NodeGraphicsInfo ToolId="BizAgi_Process_Modeler" Height="${layout.LANE_HEIGHT}" Width="1500" BorderColor="-11513776" FillColor="-1">
              <Coordinates XCoordinate="50" YCoordinate="${yCoord}" />
              <TextDirection xsi:nil="true" />
            </NodeGraphicsInfo>
          </NodeGraphicsInfos>
          <ExtendedAttributes />
        </Lane>`);
                yCoord += layout.LANE_HEIGHT;
            }
            
            const startId = uuid();
            const firstLane = laneMap[roles[0]];
            const positions = [];
            positions.push({ 
                id: startId, 
                x: layout.PADDING_LEFT, 
                y: firstLane.centerY - layout.EVENT_SIZE / 2,
                centerY: firstLane.centerY,
                centerX: layout.PADDING_LEFT + layout.EVENT_SIZE / 2,
                rightX: layout.PADDING_LEFT + layout.EVENT_SIZE,
                type: 'start'
            });
            
            let currentX = layout.PADDING_LEFT + layout.EVENT_SIZE + layout.SPACING_X;
            for (let i = 0; i < activities.length; i++) {
                const act = activities[i];
                const role = act.responsables[0] || roles[0];
                const lane = laneMap[role];
                const actId = uuid();
                positions.push({
                    id: actId, x: currentX, y: lane.centerY - layout.TASK_HEIGHT / 2,
                    centerY: lane.centerY, centerX: currentX + layout.TASK_WIDTH / 2,
                    leftX: currentX, rightX: currentX + layout.TASK_WIDTH,
                    type: 'task', activity: act, role: role
                });
                currentX += layout.TASK_WIDTH + layout.SPACING_X;
            }
            
            const endId = uuid();
            positions.push({
                id: endId, x: currentX, y: firstLane.centerY - layout.EVENT_SIZE / 2,
                centerY: firstLane.centerY, centerX: currentX + layout.EVENT_SIZE / 2,
                leftX: currentX, type: 'end'
            });
            
            const activitiesXml = positions.map(p => {
                if (p.type === 'start') {
                    return `        <Activity Id="${p.id}" Name="Inicio">
          <Description />
          <Event>
            <StartEvent Trigger="None" />
          </Event>
          <Documentation />
          <NodeGraphicsInfos>
            <NodeGraphicsInfo ToolId="BizAgi_Process_Modeler" LaneId="${firstLane.id}" Height="${layout.EVENT_SIZE}" Width="${layout.EVENT_SIZE}" BorderColor="-10311914" FillColor="-1638505">
              <Coordinates XCoordinate="${p.x}" YCoordinate="${p.y}" />
              <TextDirection xsi:nil="true" />
            </NodeGraphicsInfo>
          </NodeGraphicsInfos>
          <ExtendedAttributes />
        </Activity>`;
                } else if (p.type === 'end') {
                    return `        <Activity Id="${p.id}" Name="Fin">
          <Description />
          <Event>
            <EndEvent Result="None" />
          </Event>
          <Documentation />
          <NodeGraphicsInfos>
            <NodeGraphicsInfo ToolId="BizAgi_Process_Modeler" LaneId="${firstLane.id}" Height="${layout.EVENT_SIZE}" Width="${layout.EVENT_SIZE}" BorderColor="-6750208" FillColor="-1135958">
              <Coordinates XCoordinate="${p.x}" YCoordinate="${p.y}" />
              <TextDirection xsi:nil="true" />
            </NodeGraphicsInfo>
          </NodeGraphicsInfos>
          <ExtendedAttributes />
        </Activity>`;
                } else {
                    const lane = laneMap[p.role];
                    return `        <Activity Id="${p.id}" Name="${p.activity.name}">
          <Description>&lt;p&gt;${p.activity.action}&lt;/p&gt;</Description>
          <Implementation>
            <Task />
          </Implementation>
          <Performers>
            <Performer>${uuid()}</Performer>
          </Performers>
          <Documentation>&lt;p&gt;${p.activity.action}&lt;/p&gt;</Documentation>
          <Loop LoopType="None" />
          <NodeGraphicsInfos>
            <NodeGraphicsInfo ToolId="BizAgi_Process_Modeler" LaneId="${lane.id}" Height="${layout.TASK_HEIGHT}" Width="${layout.TASK_WIDTH}" BorderColor="-16553830" FillColor="-1249281">
              <Coordinates XCoordinate="${p.x}" YCoordinate="${p.y}" />
              <TextDirection xsi:nil="true" />
            </NodeGraphicsInfo>
          </NodeGraphicsInfos>
          <ExtendedAttributes>
            <ExtendedAttribute Name="BizagiAccountables" Value="${p.role}" />
          </ExtendedAttributes>
        </Activity>`;
                }
            });
            
            const trans = [];
            for (let i = 0; i < positions.length - 1; i++) {
                const from = positions[i];
                const to = positions[i + 1];
                const fromX = from.rightX;
                const fromY = from.centerY;
                const toX = to.leftX !== undefined ? to.leftX : to.x;
                const toY = to.centerY;
                let coordinates;
                if (fromY === toY) {
                    coordinates = `              <Coordinates XCoordinate="${fromX}" YCoordinate="${fromY}" />
              <Coordinates XCoordinate="${toX}" YCoordinate="${toY}" />`;
                } else {
                    const midX = fromX + (toX - fromX) / 2;
                    coordinates = `              <Coordinates XCoordinate="${fromX}" YCoordinate="${fromY}" />
              <Coordinates XCoordinate="${midX}" YCoordinate="${fromY}" />
              <Coordinates XCoordinate="${midX}" YCoordinate="${toY}" />
              <Coordinates XCoordinate="${toX}" YCoordinate="${toY}" />`;
                }
                trans.push(`        <Transition Id="${uuid()}" From="${from.id}" To="${to.id}">
          <Condition />
          <Description />
          <ConnectorGraphicsInfos>
            <ConnectorGraphicsInfo ToolId="BizAgi_Process_Modeler" BorderColor="-16777216">
              <TextDirection xsi:nil="true" />
${coordinates}
            </ConnectorGraphicsInfo>
          </ConnectorGraphicsInfos>
          <ExtendedAttributes />
        </Transition>`);
            }
            
            return `<?xml version="1.0" encoding="utf-8"?>
<Package xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" Id="${pkg}" Name="${id}" xmlns="http://www.wfmc.org/2009/XPDL2.2">
  <PackageHeader>
    <XPDLVersion>2.2</XPDLVersion>
    <Vendor>Bizagi Process Modeler</Vendor>
    <Created>${now}</Created>
    <ModificationDate>${now}</ModificationDate>
    <Description>${name}</Description>
    <Documentation>&lt;p style="text-align:left;"&gt;${name}&lt;/p&gt;</Documentation>
  </PackageHeader>
  <RedefinableHeader>
    <Author>Made - S2 Grupo</Author>
    <Version>1.0</Version>
    <Countrykey>${country}</Countrykey>
  </RedefinableHeader>
  <ExternalPackages />
  <Participants>
${parts}
  </Participants>
  <Pools>
    <Pool Id="${pool}" Name="${name}" Process="${proc}" BoundaryVisible="true">
      <Lanes>
${lanes.join('\n')}
      </Lanes>
      <NodeGraphicsInfos>
        <NodeGraphicsInfo ToolId="BizAgi_Process_Modeler" Height="${roles.length * layout.LANE_HEIGHT + 60}" Width="1600" BorderColor="-16777216" FillColor="-1">
          <Coordinates XCoordinate="30" YCoordinate="30" />
          <TextDirection xsi:nil="true" />
        </NodeGraphicsInfo>
      </NodeGraphicsInfos>
    </Pool>
  </Pools>
  <WorkflowProcesses>
    <WorkflowProcess Id="${proc}" Name="${name}">
      <ProcessHeader />
      <Activities>
${activitiesXml.join('\n')}
      </Activities>
      <Transitions>
${trans.join('\n')}
      </Transitions>
    </WorkflowProcess>
  </WorkflowProcesses>
  <ExtendedAttributes>
    <ExtendedAttribute Name="TIPO_x0020_DE_x0020_DOCUMENTO" Value="Proceso" />
    <ExtendedAttribute Name="CLASIFICACIÓN_x0020_DE_x0020_LA_x0020_INFORMACIÓN" Value="Sensible" />
    <ExtendedAttribute Name="Responsable_x0020_del_x0020_Proceso" Value="Dirección" />
  </ExtendedAttributes>
</Package>`;
        }
        
        // === BPMN con BPMNDiagram completo ===
        function generateBPMN(id, name, activities, roles) {
            const packageId = `Id_${uuid()}`;
            const processId = `Id_${uuid()}`;
            const poolId = `Id_${uuid()}`;
            const laneSetId = `Id_${uuid()}`;
            const collabId = `Id_${uuid()}`;
            
            // Coordenadas Bizagi-style
            const POOL_X = 30, POOL_Y = 30;
            const LANE_LABEL_W = 30;  // ancho de la columna izquierda con nombres de lanes
            const TASK_W = 100, TASK_H = 60;
            const EVENT_SIZE = 30;
            const SPACING = 70;
            const LANE_H = 120;
            const PADDING_LEFT = 50;  // dentro del lane
            
            // Total ancho/alto del pool
            const totalElements = activities.length + 2; // + start + end
            const contentW = totalElements * TASK_W + (totalElements - 1) * SPACING + 100;
            const poolW = LANE_LABEL_W + Math.max(1500, contentW);
            const poolH = roles.length * LANE_H;
            
            // Lane positions
            const lanes = [];
            const laneMap = {};
            let laneY = POOL_Y;
            for (let i = 0; i < roles.length; i++) {
                const laneId = `Id_${uuid()}`;
                laneMap[roles[i]] = { 
                    id: laneId, 
                    y: laneY, 
                    centerY: laneY + LANE_H / 2,
                    height: LANE_H 
                };
                lanes.push({ id: laneId, name: roles[i], y: laneY, height: LANE_H });
                laneY += LANE_H;
            }
            
            // Elementos del proceso (start, tasks, end)
            const startId = `Id_${uuid()}`;
            const endId = `Id_${uuid()}`;
            const elements = [];
            
            // Start
            const laneStart = laneMap[roles[0]];
            const startX = POOL_X + LANE_LABEL_W + PADDING_LEFT;
            elements.push({
                id: startId, name: 'Inicio', type: 'startEvent',
                x: startX, y: laneStart.centerY - EVENT_SIZE / 2,
                w: EVENT_SIZE, h: EVENT_SIZE,
                centerY: laneStart.centerY,
                rightX: startX + EVENT_SIZE
            });
            
            // Tasks
            let xPos = startX + EVENT_SIZE + SPACING;
            const taskFlows = []; // [{from, to}]
            let prevId = startId;
            
            for (let i = 0; i < activities.length; i++) {
                const act = activities[i];
                const role = act.responsables[0] || roles[0];
                const lane = laneMap[role];
                const taskId = `Id_${uuid()}`;
                
                elements.push({
                    id: taskId, name: act.name, type: 'task',
                    x: xPos, y: lane.centerY - TASK_H / 2,
                    w: TASK_W, h: TASK_H,
                    centerY: lane.centerY,
                    leftX: xPos, rightX: xPos + TASK_W,
                    documentation: act.action,
                    role: role
                });
                
                taskFlows.push({ from: prevId, to: taskId });
                prevId = taskId;
                xPos += TASK_W + SPACING;
            }
            
            // End
            elements.push({
                id: endId, name: 'Fin', type: 'endEvent',
                x: xPos, y: laneStart.centerY - EVENT_SIZE / 2,
                w: EVENT_SIZE, h: EVENT_SIZE,
                centerY: laneStart.centerY,
                leftX: xPos
            });
            taskFlows.push({ from: prevId, to: endId });
            
            // Generar XML del process
            let processXml = '';
            const elementMap = {};
            elements.forEach(el => elementMap[el.id] = el);
            
            // Lanes XML
            let laneSetXml = `    <laneSet id="${laneSetId}">
`;
            for (const lane of lanes) {
                // Flow nodes que pertenecen a este lane
                const flowNodes = elements.filter(el => {
                    if (el.type === 'task') return laneMap[el.role].id === lane.id;
                    return lane.id === laneStart.id; // start y end en el primer lane
                });
                
                laneSetXml += `      <lane id="${lane.id}" name="${lane.name}">
        <documentation />
`;
                for (const fn of flowNodes) {
                    laneSetXml += `        <flowNodeRef>${fn.id}</flowNodeRef>
`;
                }
                laneSetXml += `      </lane>
`;
            }
            laneSetXml += `    </laneSet>
`;
            
            // Generar flujos
            const flows = [];
            for (let i = 0; i < taskFlows.length; i++) {
                flows.push({ id: `Id_${uuid()}`, sourceRef: taskFlows[i].from, targetRef: taskFlows[i].to });
            }
            
            // Generar elementos del process
            let elementsXml = '';
            for (const el of elements) {
                const incomingFlows = flows.filter(f => f.targetRef === el.id);
                const outgoingFlows = flows.filter(f => f.sourceRef === el.id);
                
                let inOutXml = '';
                for (const f of incomingFlows) inOutXml += `      <incoming>${f.id}</incoming>\n`;
                for (const f of outgoingFlows) inOutXml += `      <outgoing>${f.id}</outgoing>\n`;
                
                if (el.type === 'startEvent') {
                    elementsXml += `    <startEvent id="${el.id}" name="${el.name}">
      <documentation />
      <extensionElements>
        <bizagi:BizagiExtensions xmlns:bizagi="http://www.bizagi.com/bpmn20">
          <bizagi:BizagiProperties>
            <bizagi:BizagiProperty name="bgColor" value="#E6FF97" />
            <bizagi:BizagiProperty name="borderColor" value="#62A716" />
            <bizagi:BizagiProperty name="textColor" value="#000000" />
            <bizagi:BizagiProperty name="textBackgroundColor" value="Transparent" />
          </bizagi:BizagiProperties>
        </bizagi:BizagiExtensions>
      </extensionElements>
${inOutXml}    </startEvent>
`;
                } else if (el.type === 'endEvent') {
                    elementsXml += `    <endEvent id="${el.id}" name="${el.name}">
      <documentation />
      <extensionElements>
        <bizagi:BizagiExtensions xmlns:bizagi="http://www.bizagi.com/bpmn20">
          <bizagi:BizagiProperties>
            <bizagi:BizagiProperty name="bgColor" value="#EEAAAA" />
            <bizagi:BizagiProperty name="borderColor" value="#990000" />
            <bizagi:BizagiProperty name="textColor" value="#000000" />
            <bizagi:BizagiProperty name="textBackgroundColor" value="Transparent" />
          </bizagi:BizagiProperties>
        </bizagi:BizagiExtensions>
      </extensionElements>
${inOutXml}    </endEvent>
`;
                } else {
                    elementsXml += `    <task id="${el.id}" name="${el.name}">
      <documentation>${el.documentation}</documentation>
      <extensionElements>
        <bizagi:BizagiExtensions xmlns:bizagi="http://www.bizagi.com/bpmn20">
          <bizagi:BizagiProperties>
            <bizagi:BizagiProperty name="bgColor" value="#ECEFFF" />
            <bizagi:BizagiProperty name="borderColor" value="#03689A" />
            <bizagi:BizagiProperty name="textColor" value="#000000" />
            <bizagi:BizagiProperty name="textBackgroundColor" value="Transparent" />
          </bizagi:BizagiProperties>
        </bizagi:BizagiExtensions>
      </extensionElements>
${inOutXml}    </task>
`;
                }
            }
            
            // Sequence Flows XML
            let flowsXml = '';
            for (const f of flows) {
                flowsXml += `    <sequenceFlow id="${f.id}" sourceRef="${f.sourceRef}" targetRef="${f.targetRef}">
      <documentation />
    </sequenceFlow>
`;
            }
            
            // === BPMNDiagram (la parte CRÍTICA que faltaba) ===
            const diagramId = `Diagram_${uuid()}`;
            const planeId = `DiagramElement_${uuid()}`;
            
            // Pool shape
            let shapesXml = `      <BPMNShape id="DiagramElement_${uuid()}" bpmnElement="${poolId}" isHorizontal="true">
        <extension xmlns="http://www.omg.org/spec/DD/20100524/DI" />
        <Bounds x="${POOL_X}" y="${POOL_Y}" width="${poolW}" height="${poolH}" xmlns="http://www.omg.org/spec/DD/20100524/DC" />
        <BPMNLabel id="DiagramElement_${uuid()}">
          <extension xmlns="http://www.omg.org/spec/DD/20100524/DI" />
          <Bounds x="0" y="0" width="0" height="0" xmlns="http://www.omg.org/spec/DD/20100524/DC" />
        </BPMNLabel>
      </BPMNShape>
`;
            
            // Lane shapes
            for (const lane of lanes) {
                shapesXml += `      <BPMNShape id="DiagramElement_${uuid()}" bpmnElement="${lane.id}" isHorizontal="true">
        <extension xmlns="http://www.omg.org/spec/DD/20100524/DI" />
        <Bounds x="${POOL_X + LANE_LABEL_W}" y="${lane.y}" width="${poolW - LANE_LABEL_W}" height="${lane.height}" xmlns="http://www.omg.org/spec/DD/20100524/DC" />
        <BPMNLabel id="DiagramElement_${uuid()}">
          <extension xmlns="http://www.omg.org/spec/DD/20100524/DI" />
          <Bounds x="0" y="0" width="0" height="0" xmlns="http://www.omg.org/spec/DD/20100524/DC" />
        </BPMNLabel>
      </BPMNShape>
`;
            }
            
            // Element shapes
            for (const el of elements) {
                shapesXml += `      <BPMNShape id="DiagramElement_${uuid()}" bpmnElement="${el.id}">
        <extension xmlns="http://www.omg.org/spec/DD/20100524/DI" />
        <Bounds x="${el.x}" y="${el.y}" width="${el.w}" height="${el.h}" xmlns="http://www.omg.org/spec/DD/20100524/DC" />
        <BPMNLabel id="DiagramElement_${uuid()}">
          <extension xmlns="http://www.omg.org/spec/DD/20100524/DI" />
          <Bounds x="0" y="0" width="${el.w}" height="${el.h}" xmlns="http://www.omg.org/spec/DD/20100524/DC" />
        </BPMNLabel>
      </BPMNShape>
`;
            }
            
            // Edges (con waypoints)
            let edgesXml = '';
            for (const f of flows) {
                const from = elementMap[f.sourceRef];
                const to = elementMap[f.targetRef];
                
                const fromX = from.rightX !== undefined ? from.rightX : (from.x + from.w);
                const fromY = from.centerY;
                const toX = to.leftX !== undefined ? to.leftX : to.x;
                const toY = to.centerY;
                
                let waypoints = '';
                if (fromY === toY) {
                    // Línea recta
                    waypoints = `        <waypoint x="${fromX}" y="${fromY}" xmlns="http://www.omg.org/spec/DD/20100524/DI" />
        <waypoint x="${toX}" y="${toY}" xmlns="http://www.omg.org/spec/DD/20100524/DI" />`;
                } else {
                    // Cambio de lane: línea en L
                    const midX = fromX + (toX - fromX) / 2;
                    waypoints = `        <waypoint x="${fromX}" y="${fromY}" xmlns="http://www.omg.org/spec/DD/20100524/DI" />
        <waypoint x="${midX}" y="${fromY}" xmlns="http://www.omg.org/spec/DD/20100524/DI" />
        <waypoint x="${midX}" y="${toY}" xmlns="http://www.omg.org/spec/DD/20100524/DI" />
        <waypoint x="${toX}" y="${toY}" xmlns="http://www.omg.org/spec/DD/20100524/DI" />`;
                }
                
                edgesXml += `      <BPMNEdge id="DiagramElement_${uuid()}" bpmnElement="${f.id}">
        <extension xmlns="http://www.omg.org/spec/DD/20100524/DI" />
${waypoints}
      </BPMNEdge>
`;
            }
            
            // Construir BPMN completo
            return `<?xml version="1.0"?>
<definitions xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:bizagi="http://www.bizagi.com/bpmn20" id="${packageId}" targetNamespace="http://www.bizagi.com/definitions/${packageId}" xmlns="http://www.omg.org/spec/BPMN/20100524/MODEL">
  <collaboration id="${collabId}">
    <participant id="${poolId}" name="${name}" processRef="${processId}" />
  </collaboration>
  <process id="${processId}" name="${name}">
    <documentation />
${laneSetXml}${elementsXml}${flowsXml}  </process>
  <BPMNDiagram id="${diagramId}" xmlns="http://www.omg.org/spec/BPMN/20100524/DI">
    <BPMNPlane id="${planeId}" bpmnElement="${packageId}">
      <extension xmlns="http://www.omg.org/spec/DD/20100524/DI" />
${shapesXml}${edgesXml}    </BPMNPlane>
    <BPMNLabelStyle id="Style_${uuid()}">
      <Font name="Segoe UI" size="8" isBold="false" isItalic="false" isUnderline="false" isStrikeThrough="false" xmlns="http://www.omg.org/spec/DD/20100524/DC" />
    </BPMNLabelStyle>
  </BPMNDiagram>
</definitions>`;
        }
        
        function generateProcess() {
            const id = document.getElementById('processId').value.trim();
            const name = document.getElementById('processName').value.trim();
            const country = document.getElementById('countryCode').value.trim();
            const desc = document.getElementById('processDescription').value.trim();
            
            if (!id || !name || !desc) {
                showMsg('Completa todos los campos', 'error');
                return;
            }
            
            try {
                document.getElementById('btnGenerate').disabled = true;
                document.getElementById('btnGenerate').innerHTML = '<span class="spinner"></span> Procesando...';
                
                const { activities, roles } = parseProcess(desc);
                if (activities.length === 0) throw new Error('Sin actividades');
                
                processData.xpdl = generateXPDL(id, name, country, activities, roles);
                processData.bpmn = generateBPMN(id, name, activities, roles);
                
                document.getElementById('xpdlOutput').textContent = processData.xpdl;
                document.getElementById('bpmnOutput').textContent = processData.bpmn;
                
                showMsg(`✅ Generado: ${activities.length} actividades, ${roles.length} lanes, con BPMNDiagram completo`, 'success');
            } catch (e) {
                showMsg(`Error: ${e.message}`, 'error');
                console.error(e);
            } finally {
                document.getElementById('btnGenerate').disabled = false;
                document.getElementById('btnGenerate').innerHTML = '⚙️ Generar';
            }
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.output-tab').forEach(e => e.classList.remove('active'));
            document.getElementById(tab)?.classList.add('active');
            event.target?.classList.add('active');
        }
        
        function clearForm() {
            document.getElementById('processId').value = 'SGP_NEW_P01';
            document.getElementById('processName').value = '';
            document.getElementById('processDescription').value = '';
        }
        
        function downloadFile(type) {
            const content = type === 'xpdl' ? processData.xpdl : processData.bpmn;
            if (!content) {
                showMsg('Primero debes generar', 'error');
                return;
            }
            const blob = new Blob([content], { type: 'application/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${document.getElementById('processId').value}.${type}`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function showMsg(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message show ${type}`;
            setTimeout(() => msg.classList.remove('show'), 5000);
        }
    </script>
</body>
</html>
